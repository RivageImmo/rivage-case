services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: bin/rails server -p 3000 -b 0.0.0.0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/rivage_case_development
      RAILS_ENV: development
      VITE_RUBY_HOST: vite
    tty: true
    stdin_open: true

  vite:
    build: .
    entrypoint: ["sh", "-c", "npm install --silent && npx vite --port 3036"]
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3036:3036"
    environment:
      NODE_ENV: development
      VITE_RUBY_HOST: 0.0.0.0

volumes:
  postgres_data:
  bundle_cache:
  node_modules:
